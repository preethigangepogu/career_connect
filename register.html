<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareerConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/" class="logo">💼 CareerConnect</a>
    <div class="nav-links">
        <a href="/pages/jobs.html">Browse Jobs</a>
        <a href="/pages/login.html" class="btn-white">Login</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-box" style="max-width:500px;">
        <a href="/" class="auth-logo">💼 CareerConnect</a>
        <h2>Create Your Account</h2>
        <p class="auth-desc">Join CareerConnect and find your next opportunity</p>

        <div id="alert"></div>

        <div class="role-tabs">
            <button class="role-tab active" id="tab-candidate" onclick="switchRole('candidate')">👤 I'm a Job Seeker</button>
            <button class="role-tab" id="tab-recruiter" onclick="switchRole('recruiter')">🏢 I'm a Recruiter</button>
        </div>
        <input type="hidden" id="role" value="candidate">

        <div class="form-row">
            <div class="form-group">
                <label>Full Name <span style="color:red">*</span></label>
                <input type="text" id="name" placeholder="e.g. Ravi Kumar">
            </div>
            <div class="form-group">
                <label>Email Address <span style="color:red">*</span></label>
                <input type="email" id="email" placeholder="you@email.com">
            </div>
        </div>

        <div class="form-group">
            <label>Password <span style="color:red">*</span></label>
            <input type="password" id="password" placeholder="Minimum 6 characters">
        </div>

        <!-- Candidate Fields -->
        <div id="candidate-fields">
            <div class="form-row">
                <div class="form-group">
                    <label>Years of Experience</label>
                    <input type="number" id="experience" placeholder="e.g. 2" min="0">
                </div>
                <div class="form-group">
                    <label>Highest Education</label>
                    <select id="education">
                        <option>High School</option>
                        <option selected>Bachelor's</option>
                        <option>Master's</option>
                        <option>PhD</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Your Skills <small>(comma separated)</small></label>
                <input type="text" id="skills" placeholder="Python, Java, SQL, React...">
            </div>
        </div>

        <!-- Recruiter Fields -->
        <div id="recruiter-fields" style="display:none;">
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" id="company" placeholder="e.g. Infosys, TCS, Google">
            </div>
        </div>

        <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account</button>

        <div class="auth-link">
            Already have an account? <a href="/pages/login.html">Sign in here</a>
        </div>
    </div>
</div>

<script src="/js/utils.js"></script>
<script>
    var params = new URLSearchParams(window.location.search);
    if (params.get("role") === "recruiter") switchRole("recruiter");

    function switchRole(role) {
        document.getElementById("role").value = role;
        document.getElementById("tab-candidate").classList.toggle("active", role === "candidate");
        document.getElementById("tab-recruiter").classList.toggle("active", role === "recruiter");
        document.getElementById("candidate-fields").style.display = role === "candidate" ? "" : "none";
        document.getElementById("recruiter-fields").style.display = role === "recruiter" ? "" : "none";
    }

    async function doRegister() {
        var role = document.getElementById("role").value;
        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        if (!name || !email || !password) {
            showAlert("alert", "Name, email and password are required", "error"); return;
        }
        var body = {
            name: name, email: email, password: password, role: role,
            experience: parseInt(document.getElementById("experience") && document.getElementById("experience").value) || 0,
            education:  (document.getElementById("education")  || {}).value || "Bachelor's",
            skills:     (document.getElementById("skills")     || {}).value || "",
            company:    (document.getElementById("company")    || {}).value || ""
        };
        try {
            await api("/register", "POST", body);
            showAlert("alert", "Account created! Taking you to login...", "success");
            setTimeout(function() { window.location.href = "/pages/login.html"; }, 1500);
        } catch(e) {
            showAlert("alert", e.message, "error");
        }
    }
</script>

</body>
</html>
